services:
  proxy:
    build: .
    restart: unless-stopped
    environment:
      - PORT=4000
    expose:
      - "4000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-proxy
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
